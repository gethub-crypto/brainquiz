<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match-3 Game</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align:center;
    color:white;
}

canvas {
    background: rgba(255,255,255,0.1);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    touch-action: none;
}

button {
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#ff6b81;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.screen {
    display:none;
}
.active {
    display:block;
}
</style>
</head>

<body>

<h1>🍬 Match-3 🍬</h1>

<div id="menu" class="screen active">
    <button onclick="startGame()">Играть</button>
</div>

<div id="game" class="screen">
    <p>Очки: <span id="score">0</span> | Время: <span id="time">60</span></p>
    <canvas id="canvas"></canvas>
    <br>
    <button onclick="restart()">Рестарт</button>
    <button onclick="goMenu()">Меню</button>
</div>

<div id="end" class="screen">
    <h2 id="endText"></h2>
    <button onclick="startGame()">Заново</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const SIZE = 8;
const TILE = 64;
canvas.width = SIZE * TILE;
canvas.height = SIZE * TILE;

let board = [];
let score = 0;
let selected = null;
let timeLeft = 60;
let timer;

// Типы конфет
const types = ["🍒","🍋","🍇","🍊","🍏","🍓"];

function randomTile() {
    return {
        type: Math.floor(Math.random() * types.length),
        special: null
    };
}

// Создание поля
function createBoard() {
    board = [];
    for (let y=0;y<SIZE;y++){
        let row=[];
        for (let x=0;x<SIZE;x++){
            row.push(randomTile());
        }
        board.push(row);
    }
}

// Рисование
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let y=0;y<SIZE;y++){
        for (let x=0;x<SIZE;x++){
            let tile = board[y][x];

            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.fillRect(x*TILE,y*TILE,TILE,TILE);

            ctx.font = "32px Arial";
            ctx.textAlign="center";
            ctx.textBaseline="middle";

            ctx.fillText(types[tile.type], x*TILE+TILE/2, y*TILE+TILE/2);

            if(tile.special==="striped"){
                ctx.strokeStyle="yellow";
                ctx.strokeRect(x*TILE+5,y*TILE+5,TILE-10,TILE-10);
            }

            if(tile.special==="bomb"){
                ctx.strokeStyle="white";
                ctx.beginPath();
                ctx.arc(x*TILE+32,y*TILE+32,20,0,Math.PI*2);
                ctx.stroke();
            }
        }
    }
}

// Поиск матчей
function findMatches() {
    let matches = [];

    // горизонтальные
    for (let y=0;y<SIZE;y++){
        let count=1;
        for (let x=1;x<SIZE;x++){
            if(board[y][x].type===board[y][x-1].type){
                count++;
            } else {
                if(count>=3){
                    for(let k=0;k<count;k++){
                        matches.push({x:x-1-k,y});
                    }
                }
                count=1;
            }
        }
        if(count>=3){
            for(let k=0;k<count;k++){
                matches.push({x:SIZE-1-k,y});
            }
        }
    }

    // вертикальные
    for (let x=0;x<SIZE;x++){
        let count=1;
        for (let y=1;y<SIZE;y++){
            if(board[y][x].type===board[y-1][x].type){
                count++;
            } else {
                if(count>=3){
                    for(let k=0;k<count;k++){
                        matches.push({x,y:y-1-k});
                    }
                }
                count=1;
            }
        }
        if(count>=3){
            for(let k=0;k<count;k++){
                matches.push({x,y:SIZE-1-k});
            }
        }
    }

    return matches;
}

// Удаление матчей
function removeMatches(matches) {
    matches.forEach(m=>{
        board[m.y][m.x]=null;
        score+=10;
    });
    document.getElementById("score").innerText = score;
}

// Гравитация
function drop() {
    for(let x=0;x<SIZE;x++){
        for(let y=SIZE-1;y>=0;y--){
            if(board[y][x]==null){
                for(let k=y-1;k>=0;k--){
                    if(board[k][x]){
                        board[y][x]=board[k][x];
                        board[k][x]=null;
                        break;
                    }
                }
            }
        }
    }

    // новые сверху
    for(let y=0;y<SIZE;y++){
        for(let x=0;x<SIZE;x++){
            if(board[y][x]==null){
                board[y][x]=randomTile();
            }
        }
    }
}

// Swap
function swap(a,b){
    let temp = board[a.y][a.x];
    board[a.y][a.x]=board[b.y][b.x];
    board[b.y][b.x]=temp;
}

// Проверка хода
function trySwap(a,b){
    swap(a,b);
    let matches = findMatches();
    if(matches.length===0){
        swap(a,b);
    } else {
        process();
    }
}

// Основной процесс
function process(){
    let matches = findMatches();
    if(matches.length>0){
        removeMatches(matches);
        setTimeout(()=>{
            drop();
            process();
        },150);
    }
}

// Клик
canvas.addEventListener("click", e=>{
    let rect = canvas.getBoundingClientRect();
    let x = Math.floor((e.clientX-rect.left)/TILE);
    let y = Math.floor((e.clientY-rect.top)/TILE);

    if(!selected){
        selected={x,y};
    } else {
        let dx=Math.abs(selected.x-x);
        let dy=Math.abs(selected.y-y);

        if(dx+dy===1){
            trySwap(selected,{x,y});
        }
        selected=null;
    }
});

// Таймер
function startTimer(){
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("time").innerText=timeLeft;

        if(timeLeft<=0){
            clearInterval(timer);
            endGame(false);
        }
    },1000);
}

// Игровой цикл
function loop(){
    draw();
    requestAnimationFrame(loop);
}

// Управление экранами
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Старт
function startGame(){
    score=0;
    timeLeft=60;
    document.getElementById("score").innerText=0;
    document.getElementById("time").innerText=60;

    createBoard();
    show("game");

    clearInterval(timer);
    startTimer();
}

// Рестарт
function restart(){
    startGame();
}

// Меню
function goMenu(){
    clearInterval(timer);
    show("menu");
}

// Конец игры
function endGame(win){
    show("end");
    document.getElementById("endText").innerText = win ? "Победа!" : "Время вышло!";
}

// Запуск
createBoard();
loop();
</script>

</body>
    </html>
