<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crystal Match - Неоновая головоломка</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Glow и основной контейнер */
        .game-container {
            max-width: 750px;
            width: 100%;
            background: rgba(10, 20, 30, 0.55);
            backdrop-filter: blur(2px);
            border-radius: 64px;
            padding: 18px 16px 22px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), 0 0 0 2px rgba(0, 255, 255, 0.15), inset 0 1px 2px rgba(255,255,255,0.1);
            transition: all 0.2s;
        }

        /* панель */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 60px;
            padding: 8px 18px;
            margin-bottom: 20px;
            gap: 10px;
            backdrop-filter: blur(8px);
            border: 1px solid cyan;
            box-shadow: 0 0 8px cyan;
        }

        .stat {
            background: #11161f;
            padding: 5px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0ff;
            font-weight: bold;
            text-shadow: 0 0 3px #0ff;
            font-size: 1rem;
        }

        .stat span:first-child {
            font-size: 1.2rem;
        }

        .lives-hearts {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .heart {
            font-size: 1.6rem;
            filter: drop-shadow(0 0 4px red);
        }

        button {
            background: linear-gradient(145deg, #1e2a3a, #0a1018);
            border: none;
            color: cyan;
            font-weight: bold;
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: 0.1s linear;
            font-family: inherit;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
        }

        button:active {
            transform: scale(0.96);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            aspect-ratio: 8 / 8;
            background: #07121e;
            border-radius: 28px;
            padding: 8px;
            gap: 5px;
            box-shadow: inset 0 0 20px rgba(0,255,255,0.2), 0 0 0 3px #0ff3;
            margin-bottom: 18px;
        }

        .cell {
            background: #0b1422;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            text-shadow: 0 0 5px currentColor;
            transform: scale(1);
        }

        .cell.selected {
            box-shadow: 0 0 0 3px gold, 0 0 0 6px rgba(255,215,0,0.5);
            transform: scale(0.98);
        }

        /* анимация падения/удаления */
        .cell-match-destroy {
            animation: popOff 0.2s ease forwards;
        }

        @keyframes popOff {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; background: white; }
        }

        .fall-animation {
            animation: fallDown 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fallDown {
            from { transform: translateY(-80px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* модалки */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: monospace;
        }
        .modal-card {
            background: #0e1a2b;
            max-width: 340px;
            width: 80%;
            padding: 20px;
            border-radius: 48px;
            text-align: center;
            border: 2px solid cyan;
            box-shadow: 0 0 35px cyan;
            color: white;
        }
        .modal-card h3 { margin-top: 0; color: cyan; }
        .flex-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
        .btn-neon { background: #2a3f54; border-radius: 40px; padding: 8px 20px; color: white; font-weight: bold; }
        .progress-bar { background: #222; height: 12px; border-radius: 20px; overflow: hidden; margin: 15px 0; }
        .progress-fill { width: 0%; height: 100%; background: cyan; transition: 0.1s linear; }

        /* инвентарь бустеров */
        .booster-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .booster-item {
            background: #0f212f;
            border-radius: 50px;
            padding: 5px 14px;
            font-size: 0.8rem;
            display: flex;
            gap: 8px;
            align-items: center;
            border: 1px solid cyan;
        }

        @media (max-width: 550px) {
            .stat { font-size: 0.7rem; padding: 3px 8px; }
            .cell { font-size: 1.4rem; border-radius: 12px; }
            .grid { gap: 3px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="top-bar">
        <div class="stat">✨ Уровень <span id="levelNum">1</span></div>
        <div class="stat">🎯 Ходы: <span id="movesLeft">0</span></div>
        <div class="stat lives-hearts" id="livesDisplay">❤️❤️❤️❤️❤️ <span id="liveTimer" style="font-size:0.7rem;">(30:00)</span></div>
        <div class="stat">🪙 <span id="coinCount">500</span></div>
        <div class="stat">⭐ <span id="scoreCurrent">0</span></div>
    </div>
    <div class="booster-bar">
        <div class="booster-item">💣 T-бомба: <span id="bombT">0</span></div>
        <div class="booster-item">🔫 L-бомба: <span id="bombL">0</span></div>
        <div class="booster-item">🌈 Color Bomb: <span id="colorBomb">0</span></div>
        <div class="booster-item">⚡ Line Blast: <span id="lineBlast">0</span></div>
    </div>
    <div class="grid" id="gameGrid"></div>
    <div style="display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; margin-top: 8px;">
        <button id="shopBtn">🛒 МАГАЗИН</button>
        <button id="boostersUseBtn">✨ Активировать бустер</button>
        <button id="pauseBtn">⏸️ ПАУЗА</button>
        <button id="levelSelectBtn">🌍 ВЫБОР УРОВНЯ</button>
    </div>
    <div id="extraMsg" style="text-align:center; margin-top: 10px; font-size:12px; color:#0ff;"></div>
</div>

<script>
    (function(){
        // ---------- КОНФИГ ----------
        const ROWS = 8, COLS = 8;
        const GEM_TYPES = 6;
        const COLORS = ['🔴','🔵','🟢','🟡','🟣','🟠']; // эмодзи для красоты
        const BONUS_MAP = {3:10,4:20,5:50};
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let selectedRow = -1, selectedCol = -1;
        let currentScore = 0, currentLevel = 1, movesLeft = 25;
        let coins = 500, lives = 5, lastRegen = Date.now();
        let levelTargets = [0,200,400,700,1100,1600,2200,3000,4000,5200,7000];
        let levelMoves = [0,25,24,23,22,21,20,19,18,17,16];
        let completedLevels = [1]; // пройденные уровни
        let bestScores = {};
        let boosterInv = { bombT:0, bombL:0, colorBomb:0, lineBlast:0 };
        let gameActive = true;
        let processing = false;
        let gridDom = document.getElementById('gameGrid');
        let coinSpan = document.getElementById('coinCount');
        let scoreSpan = document.getElementById('scoreCurrent');
        let levelNumSpan = document.getElementById('levelNum');
        let movesLeftSpan = document.getElementById('movesLeft');
        let livesDisplay = document.getElementById('livesDisplay');
        let liveTimerSpan = document.getElementById('liveTimer');
        
        // звуки простые (web audio)
        let audioCtx = null;
        function playBeep(type){
            try{
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                let freq = type==='swap'? 440 : type==='match'? 660 : type==='fall'? 330 : type==='win'? 880 : 550;
                osc.frequency.value = freq;
                gain.gain.value = 0.2;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime+0.3);
                osc.stop(audioCtx.currentTime+0.2);
            }catch(e){}
        }
        
        // сохранение
        function saveGame(){
            let data = {
                currentLevel, currentScore, coins, lives, lastRegen, completedLevels,
                bestScores, boosterInv, levelTargets, levelMoves
            };
            localStorage.setItem('CrystalMatchSave', JSON.stringify(data));
        }
        
        function loadSave(){
            let raw = localStorage.getItem('CrystalMatchSave');
            if(raw){
                try{
                    let d = JSON.parse(raw);
                    currentLevel = d.currentLevel; currentScore = d.currentScore; coins = d.coins; lives = d.lives;
                    lastRegen = d.lastRegen; completedLevels = d.completedLevels || [1];
                    bestScores = d.bestScores || {}; boosterInv = d.boosterInv || { bombT:0, bombL:0, colorBomb:0, lineBlast:0 };
                    if(d.levelTargets) levelTargets = d.levelTargets;
                    if(d.levelMoves) levelMoves = d.levelMoves;
                }catch(e){}
            }
            if(!completedLevels.includes(currentLevel)) completedLevels.push(currentLevel);
            regenLives();
            updateUI();
        }
        
        function regenLives(){
            let now = Date.now();
            let diff = now - lastRegen;
            let gained = Math.floor(diff / (30*60*1000));
            if(gained>0 && lives<5){
                lives = Math.min(5, lives+gained);
                lastRegen = now - (diff % (30*60*1000));
                if(lives>5) lives=5;
                saveGame();
            }
            if(lives===5) lastRegen = now;
        }
        
        function updateLivesTimerUI(){
            if(lives>=5){ liveTimerSpan.innerText='(полно)'; return; }
            let next = lastRegen + 30*60*1000;
            let remain = Math.max(0, next - Date.now());
            let mins = Math.floor(remain/60000);
            let secs = Math.floor((remain%60000)/1000);
            liveTimerSpan.innerText=`(+${mins}:${secs<10?'0'+secs:secs})`;
        }
        
        function spendLife(){
            if(lives<=0) { showNoLivesModal(); return false; }
            lives--;
            saveGame();
            updateUI();
            return true;
        }
        
        function initLevel(){
            if(!spendLife()) return false;
            currentScore = 0;
            let target = levelTargets[currentLevel];
            movesLeft = levelMoves[currentLevel];
            updateUI();
            generateRandomBoard();
            while(scanMatches().length>0) clearMatchesAndRefill();
            gameActive = true;
            processing = false;
            selectedRow = -1; selectedCol = -1;
            renderBoard();
            playBeep('fall');
            return true;
        }
        
        function generateRandomBoard(){
            for(let i=0;i<ROWS;i++){
                for(let j=0;j<COLS;j++){
                    board[i][j] = Math.floor(Math.random()*GEM_TYPES);
                }
            }
        }
        
        function scanMatches(){
            let matches = [];
            for(let i=0;i<ROWS;i++){
                let len=1;
                for(let j=1;j<COLS;j++){
                    if(board[i][j]===board[i][j-1] && board[i][j]!==-1) len++;
                    else{
                        if(len>=3) for(let k=j-len;k<j;k++) matches.push([i,k]);
                        len=1;
                    }
                }
                if(len>=3) for(let k=COLS-len;k<COLS;k++) matches.push([i,k]);
            }
            for(let j=0;j<COLS;j++){
                let len=1;
                for(let i=1;i<ROWS;i++){
                    if(board[i][j]===board[i-1][j] && board[i][j]!==-1) len++;
                    else{
                        if(len>=3) for(let k=i-len;k<i;k++) matches.push([k,j]);
                        len=1;
                    }
                }
                if(len>=3) for(let k=ROWS-len;k<ROWS;k++) matches.push([k,j]);
            }
            return matches;
        }
        
        async function clearMatchesAndRefill(){
            let matches = scanMatches();
            if(matches.length===0) return false;
            let matchSet = new Set(matches.map(m=>`${m[0]},${m[1]}`));
            let matchCount = matchSet.size;
            let bonusPoints = 0;
            if(matchCount>=3) bonusPoints = 10 * (matchCount>=5?50: matchCount>=4?20:10);
            currentScore += bonusPoints;
            updateUI();
            for(let m of matches){
                let r=m[0],c=m[1];
                board[r][c] = -1;
            }
            renderBoard();
            await delay(150);
            applyGravity();
            renderBoard();
            await delay(120);
            while(scanMatches().length>0){
                await clearMatchesAndRefill();
            }
            playBeep('match');
            return true;
        }
        
        async function applyGravity(){
            for(let c=0;c<COLS;c++){
                let column = [];
                for(let r=ROWS-1;r>=0;r--) if(board[r][c]!==-1) column.push(board[r][c]);
                while(column.length<ROWS) column.push(Math.floor(Math.random()*GEM_TYPES));
                for(let r=0;r<ROWS;r++) board[ROWS-1-r][c] = column[r];
            }
        }
        
        function delay(ms){ return new Promise(res=>setTimeout(res,ms)); }
        
        async function trySwap(r1,c1,r2,c2){
            if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return false;
            let temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;
            let matches = scanMatches();
            if(matches.length===0){
                temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
                return false;
            }
            playBeep('swap');
            movesLeft--;
            updateUI();
            renderBoard();
            await delay(80);
            await clearMatchesAndRefill();
            if(movesLeft<=0){
                checkLevelComplete();
            }
            return true;
        }
        
        function checkLevelComplete(){
            if(currentScore>=levelTargets[currentLevel]){
                let stars = currentScore>=levelTargets[currentLevel]*1.5?3: currentScore>=levelTargets[currentLevel]?2:1;
                let rewardCoins = 100 + stars*30;
                coins += rewardCoins;
                if(!completedLevels.includes(currentLevel)) completedLevels.push(currentLevel);
                if(currentLevel<10 && !completedLevels.includes(currentLevel+1)) completedLevels.push(currentLevel+1);
                bestScores[currentLevel] = Math.max(bestScores[currentLevel]||0, currentScore);
                saveGame();
                showWinModal(stars,rewardCoins);
                gameActive=false;
                playBeep('win');
            } else if(movesLeft<=0){
                showLoseModal();
                gameActive=false;
            }
        }
        
        function renderBoard(){
            gridDom.innerHTML='';
            for(let i=0;i<ROWS;i++){
                for(let j=0;j<COLS;j++){
                    let val = board[i][j];
                    let gemChar = (val>=0 && val<GEM_TYPES) ? COLORS[val] : '💎';
                    let div = document.createElement('div');
                    div.className = 'cell';
                    if(selectedRow===i && selectedCol===j) div.classList.add('selected');
                    div.innerText = gemChar;
                    div.style.background = `radial-gradient(circle at 30% 35%, ${getGemColor(val)}, #1a2a3a)`;
                    div.style.boxShadow = `0 0 5px ${getGemColor(val)}`;
                    div.addEventListener('click', (function(row,col){ return function(){ onCellClick(row,col); }; })(i,j));
                    gridDom.appendChild(div);
                }
            }
        }
        
        function getGemColor(type){
            const hues = ['#ff3366','#33ccff','#33ff66','#ffcc33','#aa66ff','#ff9933'];
            if(type>=0) return hues[type%hues.length];
            return '#888';
        }
        
        function onCellClick(row,col){
            if(processing || !gameActive) return;
            if(selectedRow===-1){
                selectedRow=row; selectedCol=col;
                renderBoard();
                return;
            }
            let success = false;
            (async ()=>{
                processing=true;
                success = await trySwap(selectedRow,selectedCol,row,col);
                selectedRow=-1; selectedCol=-1;
                renderBoard();
                processing=false;
                if(!success && !processing){
                    // просто сброс
                }
                updateUI();
            })();
        }
        
        function updateUI(){
            coinSpan.innerText = coins;
            scoreSpan.innerText = currentScore;
            levelNumSpan.innerText = currentLevel;
            movesLeftSpan.innerText = movesLeft;
            let heartStr = '❤️'.repeat(lives)+'🖤'.repeat(5-lives);
            livesDisplay.innerHTML = `${heartStr} `;
            updateLivesTimerUI();
            document.getElementById('bombT').innerText = boosterInv.bombT;
            document.getElementById('bombL').innerText = boosterInv.bombL;
            document.getElementById('colorBomb').innerText = boosterInv.colorBomb;
            document.getElementById('lineBlast').innerText = boosterInv.lineBlast;
        }
        
        // модалки
        function showModal(html, onClose){
            let modalDiv = document.createElement('div');
            modalDiv.className = 'modal';
            modalDiv.innerHTML = `<div class="modal-card">${html}<div class="flex-buttons"><button class="btn-neon" id="modalCloseBtn">Закрыть</button></div></div>`;
            document.body.appendChild(modalDiv);
            document.getElementById('modalCloseBtn').onclick = ()=>{
                modalDiv.remove();
                if(onClose) onClose();
            };
        }
        
        function showWinModal(stars,reward){
            showModal(`<h3>🌟 Уровень
