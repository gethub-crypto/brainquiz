<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Match</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(#0a001f, #1a0033);
            color: white;
            font-family: 'Press Start 2P', system-ui;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        .neon { 
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #ff00ff; 
        }

        #header {
            height: 70px;
            background: rgba(20,0,40,0.95);
            border-bottom: 5px solid #00ffff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 15px;
            box-shadow: 0 4px 25px #00ffff;
        }
        .header-item { display: flex; align-items: center; gap: 8px; }

        #board-wrapper {
            width: 460px;
            height: 460px;
            margin: 15px auto;
            background: #0f0022;
            border: 12px solid #00ffff;
            border-radius: 24px;
            box-shadow: 0 0 60px #00ffff, inset 0 0 40px #000;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            padding: 12px;
            position: relative;
            overflow: hidden;
        }
        .gem {
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8), 0 0 25px currentColor;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.4, 1);
            background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.9), transparent 70%);
        }
        .gem.red    { background-color: #ff3366; }
        .gem.blue   { background-color: #3388ff; }
        .gem.green  { background-color: #33ff99; }
        .gem.yellow { background-color: #ffdd33; }
        .gem.purple { background-color: #bb33ff; }
        .gem.orange { background-color: #ff8833; }

        .gem.selected {
            transform: scale(1.35);
            box-shadow: 0 0 40px #ffff00;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(5,0,30,0.97);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(#2a0044, #110022);
            border: 8px solid #00ffff;
            border-radius: 24px;
            padding: 30px 25px;
            width: 92%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 60px #00ffff;
        }
        .btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            background: linear-gradient(#00ffff, #00ccff);
            color: #000;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px #00ffff;
        }
        .btn:active { transform: scale(0.94); }
    </style>
</head>
<body>

<div id="header">
    <div class="header-item neon">LVL <span id="level-num">1</span></div>
    <div class="header-item" id="lives" style="font-size:28px;">❤️❤️❤️❤️❤️</div>
    <div class="header-item neon" style="margin-left:auto;">💎 <span id="coins">250</span></div>
    <div onclick="openShop()" style="font-size:32px;cursor:pointer;margin-left:15px;">🛒</div>
</div>

<div id="board-wrapper"></div>

<div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
    <button onclick="pauseGame()" class="btn" style="width:165px;">ПАУЗА</button>
    <button onclick="showLevelSelect()" class="btn" style="width:165px;">УРОВНИ</button>
</div>

<!-- Модальные окна (те же, что и раньше) -->
<div id="modal-main" class="modal" style="display:flex;">
    <div class="modal-content">
        <h1 class="neon" style="font-size:42px;margin-bottom:30px;">CRYSTAL<br>MATCH</h1>
        <button onclick="startGame()" class="btn">▶ ИГРАТЬ</button>
        <button onclick="showLevelSelect()" class="btn">📋 ВЫБОР УРОВНЯ</button>
        <button onclick="openShop()" class="btn">🛒 МАГАЗИН</button>
        <button onclick="showTutorial()" class="btn">❔ КАК ИГРАТЬ</button>
    </div>
</div>

<div id="modal-levels" class="modal">
    <div class="modal-content">
        <h2 class="neon">ВЫБОР УРОВНЯ</h2>
        <div id="levels-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin:25px 0;"></div>
        <button onclick="hideAllModals()" class="btn">НАЗАД</button>
    </div>
</div>

<div id="modal-win" class="modal">
    <div class="modal-content">
        <h2 class="neon">ПОБЕДА!</h2>
        <div id="win-stars" style="font-size:75px;margin:15px 0;">⭐⭐⭐</div>
        <p>Счёт: <span id="win-score" class="neon"></span></p>
        <button onclick="nextLevel()" class="btn">СЛЕДУЮЩИЙ УРОВЕНЬ</button>
        <button onclick="hideAllModals();showLevelSelect()" class="btn">МЕНЮ УРОВНЕЙ</button>
    </div>
</div>

<div id="modal-lose" class="modal">
    <div class="modal-content">
        <h2>ПОРАЖЕНИЕ</h2>
        <button onclick="watchFakeAd('life');" class="btn">📺 +1 ЖИЗНЬ</button>
        <button onclick="restartLevel()" class="btn">ПОВТОРИТЬ УРОВЕНЬ</button>
        <button onclick="hideAllModals();showLevelSelect()" class="btn">В МЕНЮ</button>
    </div>
</div>

<div id="modal-shop" class="modal">
    <div class="modal-content">
        <h2 class="neon">МАГАЗИН</h2>
        <p>💎 <span id="shop-coins">250</span></p>
        <button onclick="buyItem(0)" class="btn">❤️ Extra Life — 100</button>
        <button onclick="buyItem(1)" class="btn">🌈 Color Bomb — 80</button>
        <button onclick="buyItem(2)" class="btn">⚡ Line Blast — 70</button>
        <button onclick="hideAllModals()" class="btn">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="modal-tutorial" class="modal">
    <div class="modal-content">
        <h2 class="neon">КАК ИГРАТЬ</h2>
        <p style="line-height:1.8;margin:20px 0;">Кликни по кристаллу → кликни по соседнему.<br>Собери 3+ одинаковых!</p>
        <button onclick="hideAllModals()" class="btn">ПОНЯТНО</button>
    </div>
</div>

<script>
// ==================== ИГРА ====================
let board = [], gems = [], score = 0, movesLeft = 25, currentLevel = 1, lives = 5, coins = 250;
let selectedGem = null;
let isBusy = false;

const colors = ['','red','blue','green','yellow','purple','orange'];
const emojis = ['','🔴','🔵','🟢','🟡','🟣','🟠'];

const levels = [
    {target:1500, moves:22}, {target:2200, moves:24}, {target:3000, moves:24},
    {target:3800, moves:25}, {target:4600, moves:26}, {target:5500, moves:27}
];

function createBoard() {
    const container = document.getElementById('board-wrapper');
    container.innerHTML = '';
    board = Array.from({length:8}, () => Array(8).fill(0));
    gems = Array.from({length:8}, () => Array(8).fill(null));

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let type = Math.floor(Math.random() * 6) + 1;
            board[r][c] = type;

            const gem = document.createElement('div');
            gem.className = `gem ${colors[type]}`;
            gem.innerHTML = emojis[type];
            gem.dataset.row = r;
            gem.dataset.col = c;
            gem.addEventListener('click', handleGemClick);
            container.appendChild(gem);
            gems[r][c] = gem;
        }
    }
    removeInitialMatches();
}

function removeInitialMatches() {
    let changed = true;
    while (changed) {
        changed = false;
        // horizontal
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 6; c++) {
                if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                    board[r][c+1] = Math.floor(Math.random()*6)+1;
                    changed = true;
                }
            }
        }
        // vertical
        for (let c = 0; c < 8; c++) {
            for (let r = 0; r < 6; r++) {
                if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                    board[r+1][c] = Math.floor(Math.random()*6)+1;
                    changed = true;
                }
            }
        }
    }
}

function handleGemClick(e) {
    if (isBusy) return;
    const r = +e.currentTarget.dataset.row;
    const c = +e.currentTarget.dataset.col;

    if (!selectedGem) {
        selectedGem = {row:r, col:c, el: e.currentTarget};
        e.currentTarget.classList.add('selected');
        return;
    }

    if (selectedGem.row === r && selectedGem.col === c) {
        selectedGem.el.classList.remove('selected');
        selectedGem = null;
        return;
    }

    const dr = Math.abs(selectedGem.row - r);
    const dc = Math.abs(selectedGem.col - c);

    if (dr + dc === 1) {
        swapGems(selectedGem.row, selectedGem.col, r, c);
    } else {
        selectedGem.el.classList.remove('selected');
        selectedGem = {row:r, col:c, el: e.currentTarget};
        e.currentTarget.classList.add('selected');
    }
}

function swapGems(r1, c1, r2, c2) {
    isBusy = true;
    if (selectedGem) selectedGem.el.classList.remove('selected');

    // Swap
    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
    [gems[r1][c1], gems[r2][c2]] = [gems[r2][c2], gems[r1][c1]];

    gems[r1][c1].dataset.row = r1; gems[r1][c1].dataset.col = c1;
    gems[r2][c2].dataset.row = r2; gems[r2][c2].dataset.col = c2;

    renderBoard();

    if (hasMatches()) {
        movesLeft--;
        setTimeout(processMatches, 300);
    } else {
        // revert
        [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
        [gems[r1][c1], gems[r2][c2]] = [gems[r2][c2], gems[r1][c1]];
        renderBoard();
        isBusy = false;
    }
    selectedGem = null;
}

function renderBoard() {
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const type = board[r][c];
            const gem = gems[r][c];
            gem.className = `gem ${colors[type]}`;
            gem.innerHTML = emojis[type];
        }
    }
}

function hasMatches() {
    for (let r = 0; r < 8; r++) for (let c = 0; c < 6; c++) {
        if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) return true;
    }
    for (let c = 0; c < 8; c++) for (let r = 0; r < 6; r++) {
        if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) return true;
    }
    return false;
}

function processMatches() {
    let removed = false;
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 6; c++) {
            if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                board[r][c] = board[r][c+1] = board[r][c+2] = 0;
                removed = true;
            }
        }
    }
    for (let c = 0; c < 8; c++) {
        for (let r = 0; r < 6; r++) {
            if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                board[r][c] = board[r+1][c] = board[r+2][c] = 0;
                removed = true;
            }
        }
    }

    if (removed) {
        score += 150;
        document.getElementById('coins').textContent = coins;
        renderBoard();
        setTimeout(dropGems, 280);
    } else {
        isBusy = false;
        checkGameEnd();
    }
}

function dropGems() {
    const container = document.getElementById('board-wrapper');
    
    for (let c = 0; c < 8; c++) {
        let writeRow = 7;
        
        // Сдвигаем существующие кристаллы вниз
        for (let r = 7; r >= 0; r--) {
            if (board[r][c] !== 0) {
                if (r !== writeRow) {
                    board[writeRow][c] = board[r][c];
                    gems[writeRow][c] = gems[r][c];
                    gems[writeRow][c].dataset.row = writeRow;
                    
                    // Плавное падение
                    gems[writeRow][c].style.transition = 'transform 0.5s cubic-bezier(0.3, 0, 0.7, 1)';
                    gems[writeRow][c].style.transform = `translateY(${(writeRow - r) * 58}px)`;
                    
                    board[r][c] = 0;
                }
                writeRow--;
            }
        }
        
        // Создаём новые кристаллы сверху
        for (let r = writeRow; r >= 0; r--) {
            const type = Math.floor(Math.random() * 6) + 1;
            board[r][c] = type;
            
            const gem = document.createElement('div');
            gem.className = `gem ${colors[type]}`;
            gem.innerHTML = emojis[type];
            gem.dataset.row = r;
            gem.dataset.col = c;
            gem.addEventListener('click', handleGemClick);
            
            // Начальная позиция сверху
            gem.style.position = 'absolute';
            gem.style.left = `${c * 58 + 12}px`;
            gem.style.top = `${r * 58 + 12 - 400}px`;
            gem.style.width = '50px';
            gem.style.height = '50px';
            
            container.appendChild(gem);
            gems[r][c] = gem;
            
            // Анимация падения
            setTimeout(() => {
                gem.style.transition = 'top 0.6s cubic-bezier(0.25, 0.8, 0.4, 1)';
                gem.style.top = `${r * 58 + 12}px`;
            }, 50 + r * 30);
        }
    }
    
    // Очистка старых элементов и обновление
    setTimeout(() => {
        renderBoard();
        if (hasMatches()) {
            processMatches();
        } else {
            isBusy = false;
            checkGameEnd();
        }
    }, 700);
}

function checkGameEnd() {
    if (score >= levels[currentLevel-1].target) {
        document.getElementById('win-score').textContent = score;
        document.getElementById('modal-win').style.display = 'flex';
    } else if (movesLeft <= 0) {
        document.getElementById('modal-lose').style.display = 'flex';
    }
}

function updateHeader() {
    document.getElementById('level-num').textContent = currentLevel;
    document.getElementById('lives').textContent = '❤️'.repeat(Math.min(5, lives));
    document.getElementById('coins').textContent = coins;
}

// ==================== КНОПКИ ====================
function startGame() {
    hideAllModals();
    currentLevel = 1;
    score = 0;
    movesLeft = levels[0].moves;
    createBoard();
    updateHeader();
}

function nextLevel() {
    hideAllModals();
    if (currentLevel < levels.length) {
        currentLevel++;
        score = 0;
        movesLeft = levels[currentLevel-1].moves;
        createBoard();
        updateHeader();
    }
}

function restartLevel() {
    hideAllModals();
    score = 0;
    movesLeft = levels[currentLevel-1].moves;
    createBoard();
    updateHeader();
}

function pauseGame() {
    hideAllModals();
    document.getElementById('modal-main').style.display = 'flex';
}

function showLevelSelect() {
    hideAllModals();
    const grid = document.getElementById('levels-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= levels.length; i++) {
        const div = document.createElement('div');
        div.style.cssText = `width:55px;height:55px;border-radius:50%;background:#330066;border:5px solid ${i<=currentLevel?'#00ffff':'#555'};display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;`;
        div.textContent = i;
        div.onclick = () => {
            hideAllModals();
            currentLevel = i;
            score = 0;
            movesLeft = levels[i-1].moves;
            createBoard();
            updateHeader();
        };
        grid.appendChild(div);
    }
    document.getElementById('modal-levels').style.display = 'flex';
}

function openShop() {
    hideAllModals();
    document.getElementById('shop-coins').textContent = coins;
    document.getElementById('modal-shop').style.display = 'flex';
}

function buyItem(n) {
    if (n === 0 && coins >= 100) { coins -= 100; lives = Math.min(5, lives+1); }
    if (n === 1 && coins >= 80) coins -= 80;
    if (n === 2 && coins >= 70) coins -= 70;
    updateHeader();
    hideAllModals();
}

function watchFakeAd(type) {
    hideAllModals();
    if (type === 'life') lives = Math.min(5, lives + 1);
    updateHeader();
}

function showTutorial() {
    hideAllModals();
    document.getElementById('modal-tutorial').style.display = 'flex';
}

function hideAllModals() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
}

// ==================== ЗАПУСК ====================
window.onload = () => {
    updateHeader();
    document.getElementById('modal-main').style.display = 'flex';
    createBoard();
};
</script>
</body>
    </html>
